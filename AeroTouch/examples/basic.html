<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HandNav basic example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 3rem auto; line-height: 1.6; }
    button, a { font: inherit; padding: .8rem 1rem; margin: .4rem; border-radius: .8rem; }
    .handnav-hover { outline: 3px solid #3a86ff; outline-offset: 3px; }
  </style>
</head>
<body>
  <h1>HandNav basic example</h1>
  <p>Click start, allow camera, point with your index finger, then pinch to click.</p>
  <button id="start">Start</button>
  <button onclick="alert('Clicked with hand!')">Pinch click me</button>
  <a href="https://example.com">Example link</a>

  <script type="module">
    import HandNav from '../src/handnav.js';

    const nav = new HandNav({
      overlay: true,
      showVideo: true,
      onSwipeLeft: () => console.log('swipe left'),
      onSwipeRight: () => console.log('swipe right')
    });

    document.getElementById('start').addEventListener('click', () => nav.start());
  </script>
</body>
</html>
